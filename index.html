<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amherstburg Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="container">
    <div id="sidebar">
      <h2>Amherstburg Map</h2>

      <h3>Legend</h3>
      <div class="legend-item">
        <span class="legend-color store-color"></span> Stores
      </div>
      <div class="legend-item">
        <span class="legend-color park-color"></span> Parks
      </div>

      <h3>Stores</h3>
      <div id="store-list"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet-global.js"></script>
  <script src="script.js"></script>
</body>
</html>
